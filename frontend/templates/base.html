<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}Academic Atelier{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-error": "#ffffff",
                        "secondary-container": "#959efd",
                        "tertiary-fixed": "#89fa9b",
                        "on-secondary-container": "#27308a",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#3aad57",
                        "tertiary-container": "#003913",
                        "surface-variant": "#e1e3e4",
                        "on-primary-container": "#5a96ff",
                        "secondary": "#4c56af",
                        "inverse-primary": "#adc7ff",
                        "surface-dim": "#d9dadb",
                        "on-background": "#191c1d",
                        "error": "#ba1a1a",
                        "outline-variant": "#c6c5d4",
                        "surface": "#f8f9fa",
                        "on-tertiary-fixed-variant": "#005320",
                        "surface-tint": "#005bc0",
                        "tertiary": "#002108",
                        "inverse-on-surface": "#f0f1f2",
                        "on-secondary-fixed": "#000767",
                        "error-container": "#ffdad6",
                        "surface-container": "#edeeef",
                        "on-primary-fixed-variant": "#004493",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "primary-fixed-dim": "#adc7ff",
                        "tertiary-fixed-dim": "#6ddd81",
                        "on-primary-fixed": "#001a41",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed-variant": "#343d96",
                        "outline": "#767683",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#e0e0ff",
                        "surface-container-high": "#e7e8e9",
                        "surface-container-low": "#f3f4f5",
                        "background": "#f8f9fa",
                        "surface-bright": "#f8f9fa",
                        "on-surface": "#191c1d",
                        "secondary-fixed-dim": "#bdc2ff",
                        "primary": "#001a40",
                        "inverse-surface": "#2e3132",
                        "primary-fixed": "#d8e2ff",
                        "on-surface-variant": "#454652",
                        "on-tertiary-fixed": "#002108",
                        "primary-container": "#002e67",
                        "surface-container-highest": "#e1e3e4"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            background: rgba(225, 227, 228, 0.7);
            backdrop-filter: blur(12px);
        }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col relative {% block body_class %}{% endblock %}">
    {% block content %}
    {% endblock %}
</body>
</html>
